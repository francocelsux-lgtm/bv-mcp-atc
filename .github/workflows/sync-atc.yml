name: Sync ATC → Google Sheets

on:
  # Cada hora de 7:00 a 23:00 hora Argentina (UTC-3)
  # 7:00-20:00 AR = 10:00-23:00 UTC
  # 21:00-23:00 AR = 00:00-02:00 UTC
  schedule:
    - cron: '0 10-23 * * *'   # 7am-8pm AR
    - cron: '0 0-2 * * *'     # 9pm-11pm AR
  # Ejecucion manual desde GitHub -> Actions -> "Run workflow"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: mcp/atc

      - name: Write Google OAuth token
        run: echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > google-token.json
        working-directory: mcp/atc

      - name: Sync reservas -> Sheets
        env:
          ATC_EMAIL:                ${{ secrets.ATC_EMAIL }}
          ATC_PASSWORD:             ${{ secrets.ATC_PASSWORD }}
          ATC_LOGIN_URL:            "https://atcsports.io/club/bella-vista-paddle#!/login/signin"
          ATC_CLUB_SCHEDULE_URL:    "https://atcsports.io/club/bella-vista-paddle#!/app/grid"
          ATC_CLUB_ID:              "1629"
          ATC_DEBUG:                "true"
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_SPREADSHEET_ID:    ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_SHEET_NAME:        "ATC Reservas"
          GOOGLE_TOKEN_PATH:        ./google-token.json
        run: npm run sync
        working-directory: mcp/atc

      - name: Upload debug screenshots (solo si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: mcp/atc/debug/
          retention-days: 3
