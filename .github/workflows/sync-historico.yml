name: Sync Histórico ATC → Google Sheets

on:
  workflow_dispatch:
    inputs:
      desde:
        description: 'Fecha inicio (YYYY-MM-DD)'
        required: false
        default: '2026-01-01'
      hasta:
        description: 'Fecha fin (YYYY-MM-DD, vacío = hoy)'
        required: false
        default: ''

jobs:
  sync-historico:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: mcp/atc

      - name: Sync histórico
        env:
          ATC_EMAIL:             ${{ secrets.ATC_EMAIL }}
          ATC_PASSWORD:          ${{ secrets.ATC_PASSWORD }}
          ATC_LOGIN_URL:         "https://atcsports.io/club/bella-vista-paddle#!/login/signin"
          ATC_CLUB_SCHEDULE_URL: "https://atcsports.io/club/bella-vista-paddle#!/app/grid"
          ATC_CLUB_ID:           "1629"
          ATC_DEBUG:             "false"
          APPS_SCRIPT_URL:       ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_TOKEN:     ${{ secrets.APPS_SCRIPT_TOKEN }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_SHEET_NAME:     "ATC Reservas"
        run: |
          ARGS=""
          if [ -n "${{ inputs.desde }}" ]; then ARGS="$ARGS --desde=${{ inputs.desde }}"; fi
          if [ -n "${{ inputs.hasta }}" ]; then ARGS="$ARGS --hasta=${{ inputs.hasta }}"; fi
          npm run sync:historico -- $ARGS
        working-directory: mcp/atc

      - name: Upload debug screenshots (solo si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-historico
          path: mcp/atc/debug/
          retention-days: 3
